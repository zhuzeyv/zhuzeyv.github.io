<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>炸板雷达 — A股涨停炸板筛选</title>
<style>
:root {
  --bg:#0c0e13; --bg2:#13161e; --bg3:#1a1d28; --bg4:#22263a;
  --border:rgba(255,255,255,0.06); --border2:rgba(255,255,255,0.11);
  --text:#e2e8f4; --text2:#7a85a0; --text3:#454e66;
  --red:#f04b4b; --red-bg:rgba(240,75,75,0.12);
  --green:#25c07a; --green-bg:rgba(37,192,122,0.11);
  --amber:#f0aa30; --amber-bg:rgba(240,170,48,0.12);
  --blue:#4a9eff; --blue-bg:rgba(74,158,255,0.11);
  --r:8px; --rlg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'PingFang SC','Microsoft YaHei',-apple-system,sans-serif;min-height:100vh;font-size:14px}
a{color:var(--blue)}

/* Shell */
.shell{max-width:1300px;margin:0 auto;padding:0 20px 60px}

/* Nav */
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border);margin-bottom:24px;gap:12px;flex-wrap:wrap}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{width:34px;height:34px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.brand-name{font-size:17px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:11px;color:var(--text2);margin-top:1px}
.nav-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.date-pill{display:flex;align-items:center;gap:7px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--text2)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.src-badge{font-size:11px;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:4px 12px;color:var(--text2)}

/* Date picker */
.date-row{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.date-label{font-size:13px;color:var(--text2)}
input[type=date]{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:7px 12px;color:var(--text);font-size:13px;outline:none;cursor:pointer;color-scheme:dark}
input[type=date]:focus{border-color:var(--red)}
.btn{padding:7px 16px;border-radius:var(--r);border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;display:inline-flex;align-items:center;gap:6px;line-height:1}
.btn:hover{opacity:.82}.btn:active{transform:scale(.97)}
.btn-primary{background:var(--red);color:#fff}
.btn-ghost{background:var(--bg2);color:var(--text2);border:1px solid var(--border2)}

/* Metrics */
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
@media(max-width:800px){.metrics{grid-template-columns:repeat(2,1fr)}}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rlg);padding:14px 16px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.metric-value{font-size:24px;font-weight:700;line-height:1}
.metric-sub{font-size:11px;color:var(--text3);margin-top:4px}
.c-red{color:var(--red)}.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-blue{color:var(--blue)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px}
.tab{padding:9px 18px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--red);font-weight:600}
.tab-n{display:inline-block;background:var(--bg3);border-radius:10px;padding:1px 7px;font-size:11px;margin-left:5px}

/* Controls */
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.ctrl-label{font-size:12px;color:var(--text2)}
select{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:6px 10px;color:var(--text);font-size:12px;outline:none;cursor:pointer}
select:focus{border-color:var(--red)}
.search{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:6px 12px;color:var(--text);font-size:12px;outline:none;width:160px}
.search:focus{border-color:var(--red)}
.ctrl-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.result-count{font-size:12px;color:var(--text3)}

/* Table */
.tbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rlg);background:var(--bg2)}
table{width:100%;border-collapse:collapse;min-width:900px}
thead{background:var(--bg3)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:1px solid var(--border2)}
th:hover{color:var(--text)}
th.sort-asc::after{content:' ↑'}
th.sort-desc::after{content:' ↓'}
td{padding:11px 14px;border-top:1px solid var(--border);vertical-align:middle;white-space:nowrap}
tr:hover td{background:var(--bg3)}
.sname{font-weight:600;font-size:14px}
.scode{font-size:11px;color:var(--text3);margin-top:2px;font-family:monospace}
.pct{font-weight:700}
.pct.up{color:var(--red)}.pct.dn{color:var(--green)}.pct.flat{color:var(--text2)}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap}
.tag-sector{background:var(--blue-bg);color:var(--blue)}
.tag-hot{background:var(--red-bg);color:var(--red);font-size:10px;padding:1px 6px;margin-left:4px}
.tag-first{background:var(--green-bg);color:var(--green);font-size:10px;padding:1px 6px;margin-left:4px}
.open-dots{display:flex;gap:3px;margin-bottom:3px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--bg4)}
.dot.on{background:var(--red)}
.open-n{font-size:12px;color:var(--red);font-weight:700}
.score-wrap{display:flex;align-items:center;gap:7px}
.score-bar-bg{flex:1;max-width:54px;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.score-fill{height:100%;border-radius:2px}
.score-n{font-size:12px;font-weight:700;min-width:24px}
.time-val{font-size:12px;color:var(--text2);font-family:monospace}
.empty-msg{text-align:center;padding:60px;color:var(--text3);font-size:14px}
.loading-msg{text-align:center;padding:50px;color:var(--text2);font-size:14px}

/* Error / info banners */
.banner{border-radius:var(--r);padding:12px 16px;font-size:13px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px;line-height:1.6}
.banner-warn{background:var(--amber-bg);border:1px solid rgba(240,170,48,.25);color:var(--amber)}
.banner-err{background:var(--red-bg);border:1px solid rgba(240,75,75,.25);color:var(--red)}
.banner-ok{background:var(--green-bg);border:1px solid rgba(37,192,122,.2);color:var(--green)}
.banner-info{background:var(--bg2);border:1px solid var(--border2);color:var(--text2)}
.banner i{font-size:16px;flex-shrink:0;margin-top:1px}

/* Footer */
footer{margin-top:28px;font-size:12px;color:var(--text3);text-align:center;line-height:2}
</style>
</head>
<body>
<div class="shell">

<!-- Nav -->
<nav>
  <div class="nav-brand">
    <div class="nav-logo">📡</div>
    <div>
      <div class="brand-name">炸板雷达</div>
      <div class="brand-sub">A股涨停炸板每日筛选</div>
    </div>
  </div>
  <div class="nav-right">
    <span class="date-pill"><span class="live-dot"></span><span id="navDate">加载中...</span></span>
    <span class="src-badge">数据源：东方财富</span>
  </div>
</nav>

<!-- Banner area -->
<div id="bannerArea"></div>

<!-- Date selector -->
<div class="date-row">
  <span class="date-label">查询日期</span>
  <input type="date" id="datePicker" />
  <button class="btn btn-primary" onclick="loadData()">🔍 查询</button>
  <button class="btn btn-ghost" onclick="goToday()">回到昨日</button>
</div>

<!-- Metrics -->
<div class="metrics">
  <div class="metric"><div class="metric-label">涨停总数</div><div class="metric-value" id="mTotal">—</div><div class="metric-sub">含炸板</div></div>
  <div class="metric"><div class="metric-label">炸板数量</div><div class="metric-value c-red" id="mZb">—</div><div class="metric-sub">曾涨停后开板</div></div>
  <div class="metric"><div class="metric-label">炸板率</div><div class="metric-value c-red" id="mRate">—</div><div class="metric-sub">市场情绪参考</div></div>
  <div class="metric"><div class="metric-label">平均炸板次数</div><div class="metric-value c-amber" id="mAvg">—</div><div class="metric-sub">次数越多越弱</div></div>
  <div class="metric"><div class="metric-label">市场情绪</div><div class="metric-value" id="mEmotion">—</div><div class="metric-sub" id="mEmotionSub">—</div></div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" data-tab="0" onclick="switchTab(0,this)">炸板（未收封）<span class="tab-n" id="tn0">0</span></div>
  <div class="tab" data-tab="1" onclick="switchTab(1,this)">未炸封板<span class="tab-n" id="tn1">0</span></div>
  <div class="tab" data-tab="2" onclick="switchTab(2,this)">全部涨停<span class="tab-n" id="tn2">0</span></div>
</div>

<!-- Controls -->
<div class="controls">
  <span class="ctrl-label">行业</span>
  <select id="fIndustry" onchange="render()"><option value="">全部</option></select>
  <span class="ctrl-label">炸板次数</span>
  <select id="fOpenNum" onchange="render()">
    <option value="0">全部</option><option value="1">≥1次</option>
    <option value="2">≥2次</option><option value="3">≥3次</option>
  </select>
  <span class="ctrl-label">市场</span>
  <select id="fMarket" onchange="render()">
    <option value="">全部</option><option value="sh">沪市</option>
    <option value="sz">深市</option><option value="bj">北交所</option>
  </select>
  <span class="ctrl-label">排序</span>
  <select id="fSort" onchange="render()">
    <option value="OPEN_NUM">炸板次数</option>
    <option value="CHANGE_RATE">涨跌幅</option>
    <option value="TURNOVERRATE">换手率</option>
    <option value="DEAL_AMOUNT">成交额</option>
    <option value="FIRST_TIME">首涨停时间</option>
  </select>
  <input class="search" id="fSearch" placeholder="搜索股票名/代码" oninput="render()" />
  <div class="ctrl-right">
    <span class="result-count" id="resultCount"></span>
  </div>
</div>

<!-- Table -->
<div class="tbl-wrap">
  <table>
    <thead>
      <tr>
        <th>股票</th>
        <th onclick="setSort('OPEN_NUM')">炸板次数</th>
        <th onclick="setSort('FIRST_TIME')">首涨停</th>
        <th onclick="setSort('LAST_TIME')">末涨停</th>
        <th onclick="setSort('CHANGE_RATE')">收盘涨幅</th>
        <th onclick="setSort('HIGH_PRICE')">最高价</th>
        <th onclick="setSort('TURNOVERRATE')">换手率</th>
        <th onclick="setSort('DEAL_AMOUNT')">成交额</th>
        <th>行业</th>
        <th onclick="setSort('TOTAL_MARKET_CAP')">市值</th>
        <th>次日关注</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="11"><div class="empty-msg">选择日期后点击「查询」加载数据</div></td></tr>
    </tbody>
  </table>
</div>

<footer>
  数据来源：东方财富数据中心 · 仅供学习参考，不构成投资建议 · 股市有风险，入市须谨慎
</footer>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────
let allData = [];
let currentTab = 0;
let sortKey = 'OPEN_NUM';
let sortAsc = false;

// ── Init ──────────────────────────────────────────────────────────────
function prevTradeDay() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
  return d;
}

function dateToStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

(function init() {
  const prev = prevTradeDay();
  document.getElementById('datePicker').value = dateToStr(prev);
  document.getElementById('navDate').textContent =
    prev.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
})();

function goToday() {
  const prev = prevTradeDay();
  document.getElementById('datePicker').value = dateToStr(prev);
  loadData();
}

// ── Fetch ──────────────────────────────────────────────────────────────
// 东方财富数据中心 涨停板历史数据 API
// Fields: SECURITY_CODE, SECURITY_NAME, CHANGE_RATE, OPEN_NUM (炸板次数),
//         FIRST_TIME, LAST_TIME, TURNOVERRATE, DEAL_AMOUNT, HIGH_PRICE,
//         INDUSTRY, TOTAL_MARKET_CAP, CLOSE_PRICE, SECURITY_TYPE_CODE
async function fetchEastMoney(dateStr) {
  // 东方财富 涨停板 历史数据（含炸板次数 OPEN_NUM）
  const fields = 'SECURITY_CODE,SECURITY_NAME,CHANGE_RATE,CLOSE_PRICE,HIGH_PRICE,' +
    'OPEN_NUM,FIRST_TIME,LAST_TIME,TURNOVERRATE,DEAL_AMOUNT,TOTAL_MARKET_CAP,INDUSTRY,SECURITY_TYPE_CODE';
  const filter = `(TRADE_DATE%3D'${dateStr}')`;
  const base = `https://datacenter.eastmoney.com/api/data/v1/get?reportName=RPT_PCBZB_ZT` +
    `&columns=${fields}&pageNumber=1&pageSize=500` +
    `&sortTypes=-1&sortColumns=OPEN_NUM` +
    `&filter=${filter}&source=SECURITIES&client=PC`;

  // Try 1: direct (datacenter.eastmoney.com supports CORS)
  let result = await tryFetch(base);
  if (result) return result;

  // Try 2: CORS proxy (for cases where direct fails)
  const proxy1 = `https://corsproxy.io/?${encodeURIComponent(base)}`;
  result = await tryFetch(proxy1);
  if (result) return result;

  // Try 3: allorigins
  const proxy2 = `https://api.allorigins.win/raw?url=${encodeURIComponent(base)}`;
  result = await tryFetch(proxy2);
  if (result) return result;

  throw new Error('无法获取数据，请检查网络或稍后重试');
}

async function tryFetch(url) {
  try {
    const r = await fetch(url, { mode: 'cors' });
    if (!r.ok) return null;
    const json = await r.json();
    // Handle allorigins wrapper
    const data = json?.result?.data || json?.data?.result?.data;
    if (Array.isArray(data)) return data;
    return null;
  } catch (e) {
    return null;
  }
}

// ── Load ───────────────────────────────────────────────────────────────
async function loadData() {
  const dateStr = document.getElementById('datePicker').value;
  if (!dateStr) return;

  // Update nav date
  const [y, m, d] = dateStr.split('-');
  const dateObj = new Date(+y, +m - 1, +d);
  document.getElementById('navDate').textContent =
    dateObj.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });

  setBanner('');
  setLoading();

  try {
    const rows = await fetchEastMoney(dateStr);

    if (!rows || rows.length === 0) {
      setBanner('warn', `${dateStr} 暂无涨停数据，可能是非交易日或数据尚未更新`);
      allData = [];
      updateMetrics();
      render();
      return;
    }

    allData = rows;
    updateMetrics();
    populateIndustryFilter();
    setBanner('ok', `成功加载 ${rows.length} 条数据（涨停 + 炸板）`);
    render();
  } catch (e) {
    setBanner('err', `获取失败：${e.message}`);
    setEmpty('数据加载失败，请刷新重试');
  }
}

// ── Metrics ────────────────────────────────────────────────────────────
function updateMetrics() {
  const zbStocks = allData.filter(s => (s.OPEN_NUM || 0) > 0);
  const total = allData.length;
  const zbCount = zbStocks.length;
  const rate = total > 0 ? ((zbCount / total) * 100).toFixed(1) : '—';
  const avgOpen = zbCount > 0
    ? (zbStocks.reduce((s, r) => s + (r.OPEN_NUM || 0), 0) / zbCount).toFixed(1)
    : '—';

  document.getElementById('mTotal').textContent = total || '—';
  document.getElementById('mZb').textContent = zbCount || '—';
  document.getElementById('mRate').textContent = total > 0 ? rate + '%' : '—';
  document.getElementById('mAvg').textContent = avgOpen;

  // Emotion
  const rateNum = parseFloat(rate);
  let emotion = '—', emotionSub = '—', emotionCls = '';
  if (!isNaN(rateNum)) {
    if (rateNum < 20) { emotion = '🔥 偏强'; emotionSub = '炸板少，情绪高涨'; emotionCls = 'c-red'; }
    else if (rateNum < 35) { emotion = '😐 中性'; emotionSub = '市场分歧，谨慎操作'; emotionCls = 'c-amber'; }
    else { emotion = '❄️ 偏弱'; emotionSub = '炸板多，情绪低迷'; emotionCls = 'c-blue'; }
  }
  const el = document.getElementById('mEmotion');
  el.textContent = emotion;
  el.className = 'metric-value ' + emotionCls;
  document.getElementById('mEmotionSub').textContent = emotionSub;

  // Tab counts
  const tab0 = allData.filter(s => (s.OPEN_NUM || 0) > 0).length;
  const tab1 = allData.filter(s => (s.OPEN_NUM || 0) === 0).length;
  document.getElementById('tn0').textContent = tab0;
  document.getElementById('tn1').textContent = tab1;
  document.getElementById('tn2').textContent = total;
}

// ── Industry filter ────────────────────────────────────────────────────
function populateIndustryFilter() {
  const inds = [...new Set(allData.map(s => s.INDUSTRY).filter(Boolean))].sort();
  const sel = document.getElementById('fIndustry');
  sel.innerHTML = '<option value="">全部</option>' +
    inds.map(i => `<option value="${i}">${i}</option>`).join('');
}

// ── Render ─────────────────────────────────────────────────────────────
function switchTab(n, el) {
  currentTab = n;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setSort(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = false; }
  document.getElementById('fSort').value = key;
  render();
}

function render() {
  // Source by tab
  let data = allData;
  if (currentTab === 0) data = allData.filter(s => (s.OPEN_NUM || 0) > 0);
  else if (currentTab === 1) data = allData.filter(s => (s.OPEN_NUM || 0) === 0);

  // Filters
  const industry = document.getElementById('fIndustry').value;
  const minOpen = parseInt(document.getElementById('fOpenNum').value) || 0;
  const market = document.getElementById('fMarket').value;
  const q = document.getElementById('fSearch').value.toLowerCase();
  const sortSel = document.getElementById('fSort').value;
  if (sortSel) sortKey = sortSel;

  data = data.filter(s => {
    if (industry && s.INDUSTRY !== industry) return false;
    if (minOpen && (s.OPEN_NUM || 0) < minOpen) return false;
    if (market) {
      const code = String(s.SECURITY_CODE || '');
      const mkt = code.startsWith('6') ? 'sh' : code.startsWith('8') || code.startsWith('4') ? 'bj' : 'sz';
      if (mkt !== market) return false;
    }
    if (q) {
      const name = (s.SECURITY_NAME || '').toLowerCase();
      const code = (s.SECURITY_CODE || '').toLowerCase();
      if (!name.includes(q) && !code.includes(q)) return false;
    }
    return true;
  });

  // Sort
  data.sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (sortKey === 'FIRST_TIME' || sortKey === 'LAST_TIME') {
      // time string sort ascending by default
      av = av || '99:99'; bv = bv || '99:99';
      return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    }
    av = parseFloat(av) || 0; bv = parseFloat(bv) || 0;
    return sortAsc ? av - bv : bv - av;
  });

  document.getElementById('resultCount').textContent = `共 ${data.length} 只`;
  renderRows(data);
}

function renderRows(data) {
  const tbody = document.getElementById('tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="11"><div class="empty-msg">暂无符合条件的股票</div></td></tr>`;
    return;
  }

  tbody.innerHTML = data.map(s => {
    const code = String(s.SECURITY_CODE || '');
    const market = code.startsWith('6') ? '沪' : code.startsWith('8') || code.startsWith('4') ? '北' : '深';
    const openNum = parseInt(s.OPEN_NUM) || 0;

    // Dots (max 5 shown)
    const maxDots = Math.max(4, openNum);
    const dots = Array.from({ length: Math.min(maxDots, 6) }, (_, i) =>
      `<div class="dot${i < openNum ? ' on' : ''}"></div>`).join('');

    // Change rate display
    const cr = parseFloat(s.CHANGE_RATE) || 0;
    const crCls = cr >= 9.9 ? 'up' : cr >= 0 ? 'up' : 'dn';
    const crStr = (cr >= 0 ? '+' : '') + cr.toFixed(2) + '%';

    // Amount
    const amt = parseFloat(s.DEAL_AMOUNT) || 0;
    const amtStr = amt >= 1e8 ? (amt / 1e8).toFixed(1) + ' 亿' : amt >= 1e4 ? (amt / 1e4).toFixed(0) + ' 万' : amt.toFixed(0);

    // Market cap
    const mc = parseFloat(s.TOTAL_MARKET_CAP) || 0;
    const mcStr = mc >= 1e11 ? (mc / 1e8).toFixed(0) + '亿' : mc >= 1e8 ? (mc / 1e8).toFixed(1) + '亿' : '—';

    // Score (simple heuristic)
    const score = calcScore(s);
    const scoreColor = score >= 70 ? 'var(--green)' : score >= 45 ? 'var(--amber)' : 'var(--red)';

    // Tags
    const isFirst = openNum === 0; // 首板封死
    const isHot = openNum === 1 && cr >= 9.8;

    // Time display
    const ft = s.FIRST_TIME ? s.FIRST_TIME.slice(0, 5) : '—';
    const lt = s.LAST_TIME ? s.LAST_TIME.slice(0, 5) : '—';

    return `<tr>
      <td>
        <div class="sname">${s.SECURITY_NAME || '—'}${isHot ? '<span class="tag tag-hot">热</span>' : ''}${isFirst ? '<span class="tag tag-first">首封</span>' : ''}</div>
        <div class="scode">${market} · ${code}</div>
      </td>
      <td>
        ${openNum > 0 ? `<div class="open-dots">${dots}</div><div class="open-n">${openNum} 次</div>` : '<span style="color:var(--text3);font-size:12px">未炸板</span>'}
      </td>
      <td><span class="time-val">${ft}</span></td>
      <td><span class="time-val">${lt}</span></td>
      <td><span class="pct ${crCls}">${crStr}</span></td>
      <td style="color:var(--text2)">${parseFloat(s.HIGH_PRICE || 0).toFixed(2)}</td>
      <td style="color:var(--text2)">${parseFloat(s.TURNOVERRATE || 0).toFixed(2)}%</td>
      <td style="color:var(--text2)">${amtStr}</td>
      <td>${s.INDUSTRY ? `<span class="tag tag-sector">${s.INDUSTRY}</span>` : '—'}</td>
      <td style="color:var(--text3);font-size:12px">${mcStr}</td>
      <td>
        <div class="score-wrap">
          <div class="score-bar-bg"><div class="score-fill" style="width:${score}%;background:${scoreColor}"></div></div>
          <div class="score-n" style="color:${scoreColor}">${score}</div>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// Simple next-day attention score heuristic
function calcScore(s) {
  let score = 50;
  const openNum = parseInt(s.OPEN_NUM) || 0;
  const cr = parseFloat(s.CHANGE_RATE) || 0;
  const tr = parseFloat(s.TURNOVERRATE) || 0;
  const ft = s.FIRST_TIME || '';

  // Fewer opens = better
  score -= openNum * 12;
  // Higher close = better
  if (cr >= 9.9) score += 20;
  else if (cr >= 7) score += 10;
  else if (cr >= 4) score += 0;
  else score -= 10;
  // Ideal turnover 8-18%
  if (tr >= 8 && tr <= 18) score += 10;
  else if (tr < 5 || tr > 30) score -= 10;
  // Earlier first zt = better
  if (ft && ft < '10:30') score += 10;
  else if (ft && ft > '14:30') score -= 15;

  return Math.max(5, Math.min(99, Math.round(score)));
}

// ── Banner ─────────────────────────────────────────────────────────────
function setBanner(type, msg) {
  const area = document.getElementById('bannerArea');
  if (!type && !msg) { area.innerHTML = ''; return; }
  const icons = { warn: '⚠️', err: '❌', ok: '✅', info: 'ℹ️' };
  area.innerHTML = `<div class="banner banner-${type}">${icons[type] || 'ℹ️'} ${msg}</div>`;
}

function setLoading() {
  document.getElementById('tbody').innerHTML =
    `<tr><td colspan="11"><div class="loading-msg">⏳ 正在从东方财富获取数据...</div></td></tr>`;
  ['mTotal','mZb','mRate','mAvg','mEmotion'].forEach(id => {
    document.getElementById(id).textContent = '—';
  });
}

function setEmpty(msg) {
  document.getElementById('tbody').innerHTML =
    `<tr><td colspan="11"><div class="empty-msg">${msg}</div></td></tr>`;
}
